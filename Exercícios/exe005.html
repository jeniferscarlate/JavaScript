<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //calculadora basica no browser:

        var num1 = 0;
        var num2 = 0;
        var operador = 0;

        num1 = Number(window.prompt("Digite um valor: "));
        operador = window.prompt("Digite a operação desejada: ");
        num2 = Number(window.prompt("Digite o outro valor: "));

        switch (operador){
            case '+':
                document.write("O resultado é: " + (num1 + num2));
                break;

            case '-':
                document.write("O resultado é: " + (num1 - num2));
                break;
            
            case '*':
                document.write("O resultado é: " + (num1 * num2));
                break;

            case '/':
                document.write("O resultado é: " + (num1 / num2));
                break;

            case '%':
                document.write("O resultado é: " + (num1 % num2));
                break;
                
            default:
                document.write("Ainda não conheço essa operação");    

        }


    </script>
</body>
</html>
